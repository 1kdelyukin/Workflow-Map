<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="AgentMap — a layered node-graph workspace for mapping AI-agent systems." />
  <meta name="color-scheme" content="light dark" />
  <title>AgentMap</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M8 1.6 13.6 4.8v6.4L8 14.4 2.4 11.2V4.8Z' fill='none' stroke='%230a84ff' stroke-width='1.5' stroke-linejoin='round'/%3E%3Ccircle cx='8' cy='8' r='1.8' fill='%230a84ff'/%3E%3C/svg%3E" />
  <script>
    // set the theme before first paint to avoid a flash
    (function () {
      try {
        var t = new URLSearchParams(location.search).get('theme') || localStorage.getItem('agentmap.theme');
        if (t !== 'light' && t !== 'dark') t = 'light'; // light-first; dark via the toggle
        document.documentElement.dataset.theme = t;
      } catch (e) { document.documentElement.dataset.theme = 'light'; }
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app"></div>
  <noscript style="display:block;padding:48px;text-align:center;font-family:system-ui">AgentMap needs JavaScript to run.</noscript>
  <script type="module" src="js/main.js"></script>
</body>
</html>
